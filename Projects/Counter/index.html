<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Davi.src">
  <!-- Style-->
  <link rel="stylesheet" href="src/css/style.css">
  <!-- Title -->
  <title>Contador com incremento/decremento variavel</title>
</head>

<body>

  <main class="container">
    <div class="title">
      <h1>Contador</h1>
    </div>

    <div class="result">
      <p id="counter">0</p>
    </div>

    <div class="actions">
      <div class="field">
        <input class="input" type="number" id="value" placeholder="Valor variavel" value="1">
        <label class="label" for="value">Valor variavel</label>
      </div>

      <div class="buttons">
        <button id="btn-sub" class="btn">(-) Subtrair</button>
        <button id="btn-clear" class="btn">(0) Zerar</button>
        <button id="btn-sum" class="btn">(+) Somar</button>
      </div>
    </div>
  </main>

  <script src="src/js/script.js"></script>

</body>

</html>
